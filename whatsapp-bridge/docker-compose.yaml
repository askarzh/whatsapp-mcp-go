version: "3.9"

services:
  wa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa
    restart: always
    environment:
      IS_POSTGRES: "true"
      POSTGRES_USER: "test"
      POSTGRES_PASS: "test"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      WHATSAPP_API_KEY: "${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env or environment}"
      WHATSAPP_JWT_SECRET: "${WHATSAPP_JWT_SECRET:?set WHATSAPP_JWT_SECRET in .env or environment}"
      WEBHOOK_URL: "http://192.168.178.52:5678/webhook-test/whatsapp"
    ports:
      - "8080:8080"
    volumes:
      - media:/project/store
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "128M"
        reservations:
          cpus: "0.5"
          memory: "64M"
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: "test"
      POSTGRES_PASSWORD: "test"
      POSTGRES_DB: "testdb"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  media:
  pgdata:
